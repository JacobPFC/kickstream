  .discord-btn:hover { background: rgba(88,101,242,0.2); border-color: #5865f2; }

  .main { padding-top: 56px; padding: 76px 1.5rem 5rem; max-width: 1400px; margin: 0 auto; }
  .page-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 2px; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px; }
  .page-title span { color: var(--muted); font-size: 1rem; font-family: 'DM Sans', sans-serif; font-weight: 400; letter-spacing: 0; }

  .search-bar { display: flex; gap: 10px; margin-bottom: 1.5rem; }
  .search-bar input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; font-size: 0.85rem; color: var(--text); font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.2s; }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--muted); }
  .search-btn { background: var(--accent); color: #000; border: none; border-radius: 8px; padding: 10px 20px; font-size: 0.85rem; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: opacity 0.2s; }
  .search-btn:hover { opacity: 0.85; }

  .movies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-bottom: 2rem; }
  .movie-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; cursor: pointer; transition: all 0.2s; }
  .movie-card:hover { border-color: #2a3d52; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  .movie-card.active { border-color: var(--accent); }
  .movie-poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; background: var(--surface2); }
  .movie-poster-ph { width: 100%; aspect-ratio: 2/3; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 2rem; }
  .movie-info { padding: 8px 10px; }
  .movie-title { font-size: 0.78rem; font-weight: 600; line-height: 1.3; margin-bottom: 3px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .movie-year { font-size: 0.68rem; color: var(--muted); }

  .player-section { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 1.5rem; overflow: hidden; }
  .player-section.visible { display: block; }
  .player-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid var(--border); }
  .player-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 1px; }
  .close-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 4px 12px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
  .close-btn:hover { color: var(--text); border-color: var(--muted); }
  .player-wrap { position: relative; aspect-ratio: 16/9; background: #000; }
  .player-wrap iframe { width: 100%; height: 100%; border: none; display: block; }

  .empty { text-align: center; padding: 3rem; color: var(--muted); font-size: 0.85rem; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .loading { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 3rem; color: var(--muted); font-size: 0.85rem; }

  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--surface); border: 1px solid var(--accent); color: var(--text); padding: 10px 18px; border-radius: 8px; font-size: 0.82rem; font-weight: 500; z-index: 9999; animation: toastIn 0.3s ease; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
  @keyframes toastIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  @media (max-width: 768px) {
    header { padding: 0 0.75rem; gap: 0.6rem; }
    .discord-btn { display: none; }
    .main { padding: 70px 0.75rem 5rem; }
    .movies-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .movie-title { font-size: 0.72rem; }
  }
</style>

<script>
  const TMDB_KEY = '4ef0d7355d9ffb5151e987764708ce96'; // public TMDB API key
  const TMDB_IMG = 'https://image.tmdb.org/t/p/w300';
  let currentMovieId = null;

  function showToast(msg) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2500);
  }

  function closePlayer() {
    document.getElementById('player-section').classList.remove('visible');
    document.getElementById('player-iframe').src = '';
    document.querySelectorAll('.movie-card').forEach(c => c.classList.remove('active'));
    currentMovieId = null;
  }

  function playMovie(id, title) {
    currentMovieId = id;
    document.getElementById('player-title').textContent = title;
    document.getElementById('player-iframe').src = `https://rivestream.org/embed?type=movie&id=${id}`;
    document.getElementById('player-section').classList.add('visible');
    document.getElementById('player-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
    document.querySelectorAll('.movie-card').forEach(c => c.classList.remove('active'));
    document.querySelectorAll(`.movie-card[data-id="${id}"]`).forEach(c => c.classList.add('active'));
  }

  function buildCard(movie) {
    const card = document.createElement('div');
    card.className = 'movie-card';
    card.dataset.id = movie.id;
    const poster = movie.poster_path
      ? `<img class="movie-poster" src="${TMDB_IMG}${movie.poster_path}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'movie-poster-ph\\'>🎬</div>'">`
      : `<div class="movie-poster-ph">🎬</div>`;
    const year = movie.release_date ? movie.release_date.slice(0,4) : '';
    card.innerHTML = `${poster}<div class="movie-info"><div class="movie-title">${movie.title}</div><div class="movie-year">${year}</div></div>`;
    card.addEventListener('click', () => playMovie(movie.id, movie.title));
    return card;
  }

  function renderMovies(movies) {
    const container = document.getElementById('movies-container');
    if (!movies.length) { container.innerHTML = '<div class="empty">No movies found.</div>'; return; }
    const grid = document.createElement('div');
    grid.className = 'movies-grid';
    movies.forEach(m => grid.appendChild(buildCard(m)));
    container.innerHTML = '';
    container.appendChild(grid);
  }

  async function searchMovies() {
    const q = document.getElementById('search-input').value.trim();
    if (!q) return loadPopular();
    document.getElementById('movies-container').innerHTML = '<div class="loading"><div class="spinner"></div> Searching...</div>';
    closePlayer();
    try {
      const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(q)}&language=en-US&page=1`);
      const data = await res.json();
      renderMovies(data.results || []);
    } catch(e) {
      document.getElementById('movies-container').innerHTML = '<div class="empty">Search failed. Try again.</div>';
    }
  }

  async function loadPopular() {
    document.getElementById('movies-container').innerHTML = '<div class="loading"><div class="spinner"></div> Loading popular movies...</div>';
    try {
      const res = await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${TMDB_KEY}&language=en-US&page=1`);
      const data = await res.json();
      renderMovies(data.results || []);
    } catch(e) {
      document.getElementById('movies-container').innerHTML = '<div class="empty">Could not load movies.</div>';
    }
  }

  loadPopular();
</script>
</body>
