  { name: 'Elena',     movie: id => `https://player.embed-api.stream/?id=${id}`,        tv: (id,s,e) => `https://player.embed-api.stream/?id=${id}&s=${s}&e=${e}` },
  { name: 'Lucas',     movie: id => `https://vidsrc.icu/embed/movie/${id}`,             tv: (id,s,e) => `https://vidsrc.icu/embed/tv/${id}/${s}/${e}` },
  { name: 'Chloe',     movie: id => `https://www.2embed.cc/embed/${id}`,                tv: (id,s,e) => `https://www.2embed.cc/embedtv/${id}&s=${s}&e=${e}` },
];

let currentSourceIndex = 0;

function renderSources(type) {
  const wrap = document.getElementById('source-btns');
  wrap.innerHTML = '';
  wrap.style.display = 'flex';
  wrap.style.gap = '5px';
  wrap.style.flexWrap = 'wrap';
  SOURCES.forEach((src, i) => {
    const btn = document.createElement('button');
    btn.className = 'source-btn' + (i === currentSourceIndex ? ' active' : '');
    btn.textContent = src.name;
    btn.onclick = () => switchSource(i);
    wrap.appendChild(btn);
  });
}

function switchSource(index) {
  currentSourceIndex = index;
  document.querySelectorAll('.source-btn').forEach((b,i) => b.classList.toggle('active', i === index));
  const src = SOURCES[index];
  if (!currentItem) return;
  if (currentItem._type === 'tv') {
    document.getElementById('player-iframe').src = src.tv(currentItem.id, currentSeason, currentEpisode);
  } else {
    document.getElementById('player-iframe').src = src.movie(currentItem.id);
  }
  showToast('Switched to ' + src.name);
}

const TMDB_KEY = '4ef0d7355d9ffb5151e987764708ce96';
const IMG = 'https://image.tmdb.org/t/p/w300';
const API = 'https://api.themoviedb.org/3';

let currentType = 'movie';
let currentCat = null;
let currentPage = 1;
let currentItem = null;
let currentSeason = 1;
let currentEpisode = 1;
let totalEpisodes = 0;
let tvSeasons = [];
let autoNextTimer = null;

function showToast(msg) {
  const ex = document.querySelector('.toast'); if (ex) ex.remove();
  const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t); setTimeout(() => t.remove(), 2500);
}

function setType(type, btn) {
  currentType = type; currentCat = null; currentPage = 1;
  // Desktop tabs
  document.querySelectorAll('.type-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + type)?.classList.add('active');
  // Mobile tabs
  document.querySelectorAll('.mobile-pill.type').forEach(b => b.classList.remove('active'));
  document.getElementById('m-tab-' + type)?.classList.add('active');
  // Reset cats
  document.querySelectorAll('.cat-btn, .mobile-pill:not(.type)').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('[data-genre=""]').forEach(b => b.classList.add('active'));
  closePlayer();
  loadContent();
}

function setCat(genreId, btn) {
  currentCat = genreId; currentPage = 1;
  const val = genreId === null ? '' : String(genreId);
  document.querySelectorAll('.cat-btn, .mobile-pill:not(.type)').forEach(b => {
    b.classList.toggle('active', b.dataset.genre === val);
  });
  closePlayer();
  loadContent();
}

async function loadContent(append = false) {
  const container = document.getElementById('content-container');
  if (!append) {
    container.innerHTML = `<div class="skel-grid">${'<div class="skel"></div>'.repeat(12)}</div>`;
  }
  const base = currentType === 'movie'
    ? `${API}/discover/movie?api_key=${TMDB_KEY}&sort_by=popularity.desc&page=${currentPage}`
    : `${API}/discover/tv?api_key=${TMDB_KEY}&sort_by=popularity.desc&page=${currentPage}`;
  const url = base + (currentCat ? '&with_genres=' + currentCat : '');
  try {
    const data = await fetch(url).then(r => r.json());
    renderGrid(data.results || [], append);
  } catch(e) {
    container.innerHTML = '<div class="empty">Could not load content.</div>';
  }
}

async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return loadContent();
  document.getElementById('content-container').innerHTML = `<div class="skel-grid">${'<div class="skel"></div>'.repeat(12)}</div>`;
  closePlayer();
  try {
    const [mv, tv] = await Promise.all([
      fetch(`${API}/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(q)}`).then(r=>r.json()),
      fetch(`${API}/search/tv?api_key=${TMDB_KEY}&query=${encodeURIComponent(q)}`).then(r=>r.json())
    ]);
    const results = [
      ...(mv.results||[]).map(m=>({...m,_type:'movie'})),
      ...(tv.results||[]).map(s=>({...s,_type:'tv',title:s.name,release_date:s.first_air_date}))
    ].sort((a,b)=>b.popularity-a.popularity);
    renderGrid(results, false, true);
  } catch(e) {
    document.getElementById('content-container').innerHTML = '<div class="empty">Search failed.</div>';
  }
}

function renderGrid(items, append = false, mixed = false) {
  const container = document.getElementById('content-container');
  let grid;
  if (append) {
    grid = container.querySelector('.movies-grid');
    container.querySelector('.load-more')?.remove();
  } else {
    container.innerHTML = '';
    if (!items.length) { container.innerHTML = '<div class="empty">No results found.</div>'; return; }
    grid = document.createElement('div');
    grid.className = 'movies-grid';
    container.appendChild(grid);
  }
  items.forEach(item => {
    const type = item._type || currentType;
    const title = item.title || item.name || '';
    const year = (item.release_date || item.first_air_date || '').slice(0,4);
    const rating = item.vote_average ? item.vote_average.toFixed(1) : '';
    const card = document.createElement('div');
    card.className = 'movie-card';
    card.innerHTML = `
      ${item.poster_path ? `<img class="movie-poster" src="${IMG}${item.poster_path}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'movie-poster-ph\\'>🎬</div>'">` : '<div class="movie-poster-ph">🎬</div>'}
      ${mixed ? `<div class="type-badge">${type==='tv'?'TV':'Film'}</div>` : ''}
      <div class="movie-info">
        <div class="movie-title">${title}</div>
        <div class="movie-meta-row">
          <span class="movie-year">${year}</span>
          ${rating ? `<span class="movie-rating">★ ${rating}</span>` : ''}
        </div>
      </div>`;
    card.addEventListener('click', () => openItem({...item, _type: type}));
    grid.appendChild(card);
  });
  if (!mixed) {
    const btn = document.createElement('button');
    btn.className = 'load-more';
    btn.textContent = 'Load More';
    btn.onclick = () => { currentPage++; loadContent(true); };
    container.appendChild(btn);
  }
}

async function openItem(item) {
  cancelAutoNext();
  currentItem = item;
  document.querySelectorAll('.movie-card').forEach(c => c.classList.remove('active'));

  const section = document.getElementById('player-section');
  section.classList.add('visible');
  section.scrollIntoView({ behavior: 'smooth', block: 'start' });
  document.getElementById('player-title').textContent = item.title || item.name;
  document.getElementById('player-ep-label').textContent = '';
  document.getElementById('autonext-bar').classList.remove('visible');

  if (item._type === 'tv') {
    document.getElementById('ep-sidebar').style.display = 'flex';
    document.getElementById('ep-sidebar').style.flexDirection = 'column';
    document.getElementById('next-ep-btn').style.display = '';
    currentSourceIndex = 0;
    renderSources('tv');
    currentSeason = 1; currentEpisode = 1;
    await loadSeasons(item.id);
    await loadEpisodes(1);
    playEpisode(item.id, 1, 1);
  } else {
    document.getElementById('ep-sidebar').style.display = 'none';
    document.getElementById('next-ep-btn').style.display = 'none';
    currentSourceIndex = 0;
    renderSources('movie');
    document.getElementById('player-iframe').src = SOURCES[0].movie(item.id);
  }
}

async function loadSeasons(showId) {
  const sel = document.getElementById('season-select');
  sel.innerHTML = '<option>Loading...</option>';
  try {
    const data = await fetch(`${API}/tv/${showId}?api_key=${TMDB_KEY}`).then(r=>r.json());
    tvSeasons = (data.seasons||[]).filter(s=>s.season_number>0);
    sel.innerHTML = tvSeasons.map(s=>`<option value="${s.season_number}">Season ${s.season_number} (${s.episode_count} eps)</option>`).join('');
  } catch(e) { sel.innerHTML = '<option value="1">Season 1</option>'; }
}

async function loadEpisodes(seasonNum) {
  currentSeason = parseInt(seasonNum);
  document.getElementById('season-select').value = seasonNum;
  const list = document.getElementById('ep-list');
  list.innerHTML = `<div style="padding:1rem;color:var(--muted);font-size:0.8rem;display:flex;align-items:center;gap:8px;"><div class="spinner"></div> Loading...</div>`;
  try {
    const data = await fetch(`${API}/tv/${currentItem.id}/season/${seasonNum}?api_key=${TMDB_KEY}`).then(r=>r.json());
    const eps = data.episodes || [];
    totalEpisodes = eps.length;
    list.innerHTML = '';
    eps.forEach(ep => {
      const el = document.createElement('div');
      el.className = 'ep-item' + (ep.episode_number === currentEpisode && currentSeason === parseInt(seasonNum) ? ' active' : '');
      el.dataset.ep = ep.episode_number;
      el.innerHTML = `<div class="ep-num">E${ep.episode_number}</div><div class="ep-name">${ep.name||'Episode '+ep.episode_number}</div>`;
      el.addEventListener('click', () => {
        cancelAutoNext();
        currentEpisode = ep.episode_number;
        playEpisode(currentItem.id, currentSeason, currentEpisode);
        list.querySelectorAll('.ep-item').forEach(i=>i.classList.remove('active'));
        el.classList.add('active');
        el.scrollIntoView({block:'nearest'});
      });
      list.appendChild(el);
    });
  } catch(e) { list.innerHTML = '<div class="empty">Could not load episodes.</div>'; }
}

function playEpisode(showId, season, episode) {
  currentSeason = season; currentEpisode = episode;
  document.getElementById('player-iframe').src = SOURCES[currentSourceIndex].tv(showId, season, episode);
  document.getElementById('player-ep-label').textContent = `Season ${season} · Episode ${episode}`;
  document.getElementById('autonext-bar').classList.remove('visible');
  document.querySelectorAll('.ep-item').forEach(i => i.classList.toggle('active', parseInt(i.dataset.ep) === episode));
}

async function playNextEpisode() {
  cancelAutoNext();
  if (!currentItem || currentItem._type !== 'tv') return;
  if (currentEpisode < totalEpisodes) {
    currentEpisode++;
    playEpisode(currentItem.id, currentSeason, currentEpisode);
    document.querySelector('.ep-item.active')?.scrollIntoView({block:'nearest'});
  } else {
    const next = tvSeasons.find(s => s.season_number === currentSeason + 1);
    if (next) {
      currentEpisode = 1;
      await loadEpisodes(next.season_number);
      playEpisode(currentItem.id, next.season_number, 1);
      showToast(`Now playing Season ${next.season_number}`);
    } else {
      showToast('No more episodes!');
    }
  }
}

function startAutoNext() {
  if (!document.getElementById('autonext-cb').checked) return;
  if (!currentItem || currentItem._type !== 'tv') return;
  let count = 10;
  const bar = document.getElementById('autonext-bar');
  const countEl = document.getElementById('autonext-count');
  const fill = document.getElementById('autonext-fill');
  bar.classList.add('visible');
  countEl.textContent = count;
  fill.style.width = '100%';
  autoNextTimer = setInterval(() => {
    count--;
    countEl.textContent = count;
    fill.style.width = (count * 10) + '%';
    if (count <= 0) { cancelAutoNext(); playNextEpisode(); }
  }, 1000);
}

function cancelAutoNext() {
  if (autoNextTimer) { clearInterval(autoNextTimer); autoNextTimer = null; }
  document.getElementById('autonext-bar').classList.remove('visible');
}

function closePlayer() {
  cancelAutoNext();
  currentItem = null;
  document.getElementById('player-section').classList.remove('visible');
  document.getElementById('player-iframe').src = '';
  document.getElementById('ep-sidebar').style.display = 'none';
  document.getElementById('next-ep-btn').style.display = 'none';
  document.querySelectorAll('.movie-card').forEach(c => c.classList.remove('active'));
}

// Listen for episode complete from vidsrc
window.addEventListener('message', e => {
  if (e.data?.type === 'PLAYER_EVENT' && e.data.data?.event === 'complete') startAutoNext();
});

loadContent();
</script>
