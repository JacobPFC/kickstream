  <main class="main">

          <div class="player-placeholder">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            <span>Select a stream to watch</span>
          </div>
        </div>
        <div class="player-panel">
          <div class="player-match-info">
            <div class="now-playing-label">Now Playing</div>
            <div class="now-playing-title" id="now-playing-title">—</div>
            <div class="teams-row" id="teams-row" style="display:none"></div>
          </div>
          <div class="streams-header">Streams</div>
          <div class="stream-list" id="stream-list"><div class="no-streams">No match selected</div></div>

    <div id="channel-search-bar" style="display:none;margin-bottom:1rem;">
      <div class="header-search" style="max-width:100%;position:relative;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;"><path d="M21 19l-4.35-4.35A7.5 7.5 0 1 0 15 16.65L19.35 21 21 19zm-9-3a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11z"/></svg>
        <input type="text" placeholder="Search channels..." id="channel-search-input" oninput="filterChannels(this.value)" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 14px 8px 36px;font-size:0.82rem;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;">
      </div>
    </div>
    <div id="matches-container">
      <div class="skel-grid">
        <div class="skel"></div><div class="skel"></div><div class="skel"></div>
        <div class="skel"></div><div class="skel"></div><div class="skel"></div>
      </div>
    </div>

    <!-- Native Ad -->
    <div style="margin: 1rem 0;">
      <script async="async" data-cfasync="false" src="https://pl29072448.profitablecpmratenetwork.com/3571a161b12859500250b6695f54b5c2/invoke.js"></script>
      <div id="container-3571a161b12859500250b6695f54b5c2"></div>
    </div>
  </main>
</div>

<script>
  const W = 'https://cold-term-f5a2.sebythewilly.workers.dev';

  const SPORT_ICONS = {
    football:'⚽', basketball:'🏀', tennis:'🎾', hockey:'🏒', baseball:'⚾',
    mma:'🥊', boxing:'🥊', rugby:'🏉', volleyball:'🏐', cricket:'🏏',
    golf:'⛳', motorsport:'🏎️', cycling:'🚴', darts:'🎯', other:'🎯', fight:'🥊'
  };
  const SPORT_NAMES = {
    football:'Football', basketball:'Basketball', tennis:'Tennis', hockey:'Hockey',
    baseball:'Baseball', mma:'MMA', boxing:'Boxing', rugby:'Rugby',
    volleyball:'Volleyball', cricket:'Cricket', golf:'Golf', motorsport:'Motorsport',
    cycling:'Cycling', darts:'Darts', other:'Other', fight:'Fight'
  };
  const COUNTRY_NAMES = {
    gb:'🇬🇧 United Kingdom', us:'🇺🇸 United States', au:'🇦🇺 Australia',
    ca:'🇨🇦 Canada', fr:'🇫🇷 France', de:'🇩🇪 Germany', es:'🇪🇸 Spain',
    it:'🇮🇹 Italy', pt:'🇵🇹 Portugal', nl:'🇳🇱 Netherlands', gr:'🇬🇷 Greece',
    pl:'🇵🇱 Poland', tr:'🇹🇷 Turkey', ru:'🇷🇺 Russia', sa:'🇸🇦 Saudi Arabia',
    ar:'🇦🇷 Argentina', br:'🇧🇷 Brazil', mx:'🇲🇽 Mexico', za:'🇿🇦 South Africa',
    dk:'🇩🇰 Denmark', se:'🇸🇪 Sweden', nz:'🇳🇿 New Zealand', rs:'🇷🇸 Serbia',
    hr:'🇭🇷 Croatia', bg:'🇧🇬 Bulgaria', ro:'🇷🇴 Romania', be:'🇧🇪 Belgium',
    cz:'🇨🇿 Czech Republic', at:'🇦🇹 Austria', hu:'🇭🇺 Hungary', il:'🇮🇱 Israel',
    ae:'🇦🇪 UAE', eg:'🇪🇬 Egypt', cy:'🇨🇾 Cyprus', co:'🇨🇴 Colombia',
    in:'🇮🇳 India', uy:'🇺🇾 Uruguay', cl:'🇨🇱 Chile'
  };

  let currentFilter = 'live';
  let currentSport = 'all';
  let allMatches = [];
  let channelsLoaded = false;
  let channelsView = false;
  let currentStreams = [];
  let currentStreamIndex = 0;

  function filterSearch(q) {
    q = q.toLowerCase().trim();
    document.querySelectorAll('.match-card').forEach(c => {
      const t = c.querySelector('.card-title')?.textContent.toLowerCase() || '';
      c.style.display = (!q || t.includes(q)) ? '' : 'none';
    });
  }

  function setFilter(filter, btn) {
    channelsView = false;
    currentFilter = filter;
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('search-input').value = '';
    document.getElementById('channel-search-bar').style.display = 'none';
    closeChannelPlayer();
    closePlayer();
    loadMatches();
  }

  function selectSport(sport, btn) {
    currentSport = sport;
    document.querySelectorAll('.sport-link').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('search-input').value = '';
    closePlayer();
    renderMatches(allMatches);
  }

  function getEndpoint() {
    if (currentFilter === 'live') return W + '/api/matches/live';
    if (currentFilter === 'today') return W + '/api/matches/all-today';
    return W + '/api/matches/all';
  }

  async function loadSports() {
    try {
      const res = await fetch(W + '/api/sports');
      const sports = await res.json();
      const sidebar = document.getElementById('sidebar');
      sports.forEach(sport => {
        const icon = SPORT_ICONS[sport.id] || '🎯';
        const btn = document.createElement('button');
        btn.className = 'sport-link';
        btn.dataset.sport = sport.id;
        btn.innerHTML = `<span class="sport-icon">${icon}</span> ${sport.name} <span class="sport-count" id="count-${sport.id}">—</span>`;
        btn.onclick = () => selectSport(sport.id, btn);
        sidebar.appendChild(btn);
      });
    } catch(e) {}
  }

  async function loadMatches() {
    if (channelsView) return;
    document.getElementById('matches-container').innerHTML = `<div class="skel-grid">
      <div class="skel"></div><div class="skel"></div><div class="skel"></div>
      <div class="skel"></div><div class="skel"></div><div class="skel"></div></div>`;
    try {
      const res = await fetch(getEndpoint());
      if (!res.ok) throw new Error(res.status);
      allMatches = await res.json();
      if (currentFilter === 'live') document.getElementById('live-count').textContent = allMatches.length;
      updateSidebarCounts(allMatches);
      renderMatches(allMatches);
    } catch(e) {
      document.getElementById('matches-container').innerHTML = `<div class="empty">
        <p>Could not load matches. Check your connection.</p>
        <p style="margin-top:10px;font-size:0.8rem;color:#4a6280">🇬🇧 If you are in the UK, a VPN is required to access streams.<br>We recommend <a href="https://1.1.1.1" target="_blank" style="color:#00e676">Cloudflare WARP</a> — it's free.</p>
      </div>`;
    }
  }

  function updateSidebarCounts(matches) {
    const counts = {};
    matches.forEach(m => { counts[m.category] = (counts[m.category]||0)+1; });
    document.getElementById('count-all').textContent = matches.length;
    Object.entries(counts).forEach(([sport, count]) => {
      const el = document.getElementById('count-'+sport);
      if (el) el.textContent = count;
    });
  }

  function renderMatches(matches) {
    if (channelsView) return;
    const filtered = currentSport === 'all' ? matches : matches.filter(m => m.category === currentSport);
    if (!filtered.length) {
      document.getElementById('matches-container').innerHTML = `<div class="empty">No matches available right now.</div>`;
      return;
    }
    const groups = {};
    filtered.forEach(m => {
      if (!groups[m.category]) groups[m.category] = [];
      groups[m.category].push(m);
    });
    const container = document.createElement('div');
    Object.entries(groups).forEach(([sport, sportMatches]) => {
      const icon = SPORT_ICONS[sport] || '🎯';
      const name = SPORT_NAMES[sport] || sport;
      const isLive = currentFilter === 'live';
      const section = document.createElement('div');
      section.className = 'sport-section';
      section.innerHTML = `<div class="sport-section-title"><span>${icon}</span> ${name} <span class="sport-section-count">${sportMatches.length}</span></div>`;
      const grid = document.createElement('div');
      grid.className = 'matches-grid';
      sportMatches.forEach(match => grid.appendChild(buildCard(match, isLive)));
      section.appendChild(grid);
      container.appendChild(section);
    });
    document.getElementById('matches-container').innerHTML = '';
    document.getElementById('matches-container').appendChild(container);
  }

  function buildCard(match, isLive) {
    const card = document.createElement('div');
    card.className = 'match-card' + (isLive ? ' live-card' : '');
    const timeStr = new Date(match.date).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    const icon = SPORT_ICONS[match.category] || '🎯';
    const homeName = match.teams?.home?.name || '';
    const awayName = match.teams?.away?.name || '';
    const homeInitial = homeName ? homeName[0].toUpperCase() : icon;
    const awayInitial = awayName ? awayName[0].toUpperCase() : icon;
    const tag = isLive
      ? `<div class="card-live-tag"><div class="card-live-dot"></div>LIVE</div>`
      : `<div class="card-time-tag">${timeStr}</div>`;

    const top = document.createElement('div');
    top.className = 'card-poster';
    top.innerHTML = `<div class="card-poster-teams"><div class="poster-badge" title="${homeName}">${homeInitial}</div><div class="poster-vs">VS</div><div class="poster-badge" title="${awayName}">${awayInitial}</div></div>${tag}`;

    const body = document.createElement('div');
    body.className = 'card-body';
    body.innerHTML = `<div class="card-title">${match.title}</div><div class="card-meta"><span>${match.sources?.length||0} stream${match.sources?.length!==1?'s':''}</span><span>${timeStr}</span></div>`;

    const btnWrap = document.createElement('div');
    btnWrap.className = 'card-footer-btns';

    const watchBtn = document.createElement('button');
    watchBtn.className = 'card-watch';
    watchBtn.textContent = '▶ Watch';
    watchBtn.addEventListener('click', e => { e.stopPropagation(); openMatch(match); });

    const shareBtn = document.createElement('button');
    shareBtn.className = 'card-share';
    shareBtn.textContent = '🔗';
    shareBtn.title = 'Copy share link';
    shareBtn.addEventListener('click', e => {
      e.stopPropagation();
      const url = window.location.origin + window.location.pathname + '?match=' + match.id;
      navigator.clipboard.writeText(url).then(() => showToast('Link copied!')).catch(() => prompt('Copy this link:', url));
    });

    const multiBtn = document.createElement('button');
    multiBtn.className = 'card-multi';
    multiBtn.textContent = '⊞';
    multiBtn.title = 'Add to Multistream';
    multiBtn.addEventListener('click', e => { e.stopPropagation(); addToMultistream(match, multiBtn); });

    btnWrap.appendChild(watchBtn);
    btnWrap.appendChild(shareBtn);
    btnWrap.appendChild(multiBtn);
    body.appendChild(btnWrap);
    card.appendChild(top);
    card.appendChild(body);
    return card;
  }

  function showToast(msg) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2500);
  }

  async function openMatch(match) {
    history.pushState({matchId: match.id}, '', '?match=' + match.id);
    document.getElementById('now-playing-title').textContent = match.title;
    document.getElementById('player-section').classList.add('visible');
    document.getElementById('player-section').scrollIntoView({behavior:'smooth', block:'start'});

    const teamsRow = document.getElementById('teams-row');
    if (match.teams?.home || match.teams?.away) {
      const icon = SPORT_ICONS[match.category]||'🎯';
      const hn = match.teams?.home?.name||'';
      const an = match.teams?.away?.name||'';
      const hi = hn ? hn[0].toUpperCase() : icon;
      const ai = an ? an[0].toUpperCase() : icon;
      teamsRow.innerHTML = `<div class="team-col"><div class="team-badge-sm ph">${hi}</div><div class="team-nm">${hn}</div></div><div class="vs-sm">VS</div><div class="team-col"><div class="team-badge-sm ph">${ai}</div><div class="team-nm">${an}</div></div>`;
      teamsRow.style.display = 'flex';
    } else teamsRow.style.display = 'none';

    document.getElementById('player-wrap').innerHTML = `<div class="player-placeholder"><div class="spinner"></div>Loading...</div>`;
    document.getElementById('stream-list').innerHTML = `<div class="no-streams"><span class="spinner"></span>Fetching streams...</div>`;

    const sources = match.sources || [];
    if (!sources.length) {
      document.getElementById('stream-list').innerHTML = '<div class="no-streams">No streams available</div>';
      document.getElementById('player-wrap').innerHTML = `<div class="player-placeholder"><svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor"><path d="M11 15h2v2h-2zm0-8h2v6h-2zm1-5C6.47 2 2 6.5 2 12a10 10 0 0010 10A10 10 0 0022 12 10 10 0 0012 2z"/></svg><span>No streams available</span></div>`;
      return;
    }

    // Fetch all stream sources in parallel and build embed URLs from streamed API data
    const results = await Promise.all(
      sources.map(s =>
        fetch(`${W}/api/stream/${s.source}/${s.id}`)
          .then(r => r.json())
          .then(data => {
            const arr = Array.isArray(data) ? data : [];
            return arr.map(stream => ({
              ...stream,
              _source: s.source,
              _id: s.id,
              // Always build embed URL from streamed API fields — don't trust s.embedUrl
              embedUrl: `https://embedsports.top/embed/${s.source}/${s.id}/${stream.streamNo || 1}`
            }));
          })
          .catch(() => [])
      )
    );
    const streams = results.flat();

    if (!streams.length) {
      document.getElementById('stream-list').innerHTML = '<div class="no-streams">No streams found</div>';
      document.getElementById('player-wrap').innerHTML = `<div class="player-placeholder"><svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor"><path d="M11 15h2v2h-2zm0-8h2v6h-2zm1-5C6.47 2 2 6.5 2 12a10 10 0 0010 10A10 10 0 0022 12 10 10 0 0012 2z"/></svg><span>No streams right now</span></div>`;
      return;
    }

    // Store streams globally so auto-failover can access them
    currentStreams = streams;
    currentStreamIndex = 0;

    const list = document.getElementById('stream-list');
    list.innerHTML = '';
    streams.forEach((s, i) => {
      const embedUrl = s.embedUrl;

      const item = document.createElement('div');
      item.className = 'stream-item';
      item.dataset.index = i;
      item.style.cursor = 'pointer';
      item.innerHTML = `
        <div class="stream-lang">${s.language || 'Stream'} #${s.streamNo || i + 1}</div>
        ${s.hd ? '<div class="stream-hd">HD</div>' : ''}
        <div class="stream-src">${s._source || s.source || ''}</div>
      `;
      item.addEventListener('click', () => { currentStreamIndex = i; embedStream(embedUrl, item); });

      const newTab = document.createElement('a');
      newTab.className = 'stream-newtab-btn';
      newTab.href = embedUrl;
      newTab.target = '_blank';
      newTab.rel = 'noopener noreferrer';
      newTab.title = 'Open in new tab';
      newTab.innerHTML = '↗';

      const wrap = document.createElement('div');
      wrap.className = 'stream-item-btns';
      wrap.appendChild(item);
      wrap.appendChild(newTab);
      list.appendChild(wrap);
    });

    // Auto-load first stream
    if (streams[0]?.embedUrl) {
      const first = list.querySelector('.stream-item');
      if (first) embedStream(streams[0].embedUrl, first);
    }
  }

  function embedStream(embedUrl, itemEl) {
    document.querySelectorAll('.stream-item').forEach(el => el.style.background = '');
    if (itemEl) itemEl.style.background = 'rgba(0,230,118,0.08)';
    const playerWrap = document.getElementById('player-wrap');
    playerWrap.innerHTML = `
      <div class="player-iframe-wrap">
        <iframe id="stream-iframe" src="${embedUrl}" allow="autoplay; fullscreen; encrypted-media" scrolling="no"></iframe>
        <div id="player-blocked" style="display:none" class="player-blocked">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor" style="opacity:0.3"><path d="M11 15h2v2h-2zm0-8h2v6h-2zm1-5C6.47 2 2 6.5 2 12a10 10 0 0010 10A10 10 0 0022 12 10 10 0 0012 2z"/></svg>
          <p>This stream can't be embedded.</p>
          <a class="open-tab-btn" href="${embedUrl}" target="_blank" rel="noopener noreferrer">↗ Open in New Tab</a>
        </div>
      </div>`;

    // Check if stream loaded — if not, auto switch to next
    setTimeout(() => {
      const iframe = document.getElementById('stream-iframe');
      const blocked = document.getElementById('player-blocked');
      if (!iframe || !blocked) return;
      let failed = false;
      try {
        const doc = iframe.contentDocument || iframe.contentWindow?.document;
        if (!doc || doc.URL === 'about:blank') failed = true;
      } catch(e) {}
      if (failed) {
        // Try next stream automatically
        if (currentStreams.length > 1 && currentStreamIndex < currentStreams.length - 1) {
          currentStreamIndex++;
          const nextStream = currentStreams[currentStreamIndex];
          const nextItem = document.querySelector(`.stream-item[data-index="${currentStreamIndex}"]`);
          showToast(`Stream failed — switching to stream ${currentStreamIndex + 1}`);
          embedStream(nextStream.embedUrl, nextItem);
        } else {
          // No more streams to try
          iframe.style.display = 'none';
          blocked.style.display = 'flex';
        }
      }
    }, 5000);
  }

  function closePlayer() {
    history.pushState({}, '', window.location.pathname);
    currentStreams = [];
    currentStreamIndex = 0;
    document.getElementById('player-section').classList.remove('visible');
    document.getElementById('player-wrap').innerHTML = `<div class="player-placeholder"><svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg><span>Select a stream to watch</span></div>`;
    document.getElementById('stream-list').innerHTML = '<div class="no-streams">No match selected</div>';
    document.getElementById('teams-row').style.display = 'none';
  }

  let hlsInstance = null;

  function playChannel(streamUrl, channelName, cardEl) {
    // Close sports player if open
    closePlayer();
    document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
    if (cardEl) cardEl.classList.add('active');

    // Remove existing channel player if present
    const existing = document.getElementById('channel-player-section');
    if (existing) existing.remove();
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }

    const section = document.createElement('div');
    section.id = 'channel-player-section';
    section.style.cssText = 'background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:1.5rem;overflow:hidden;';
    section.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:1px;">${channelName}</div>
        <button onclick="closeChannelPlayer()" style="background:transparent;border:1px solid var(--border);color:var(--muted);padding:4px 12px;border-radius:6px;font-size:0.75rem;cursor:pointer;font-family:'DM Sans',sans-serif;">✕ Close</button>
      </div>
      <div style="position:relative;aspect-ratio:16/9;background:#000;">
        <video id="channel-video" style="width:100%;height:100%;display:block;" controls autoplay></video>
      </div>`;

    const container = document.getElementById('matches-container');
    container.insertBefore(section, container.firstChild);
    section.scrollIntoView({ behavior: 'smooth', block: 'start' });

    const video = document.getElementById('channel-video');
    if (Hls.isSupported()) {
      hlsInstance = new Hls();
      hlsInstance.loadSource(streamUrl);
      hlsInstance.attachMedia(video);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(()=>{}));
      hlsInstance.on(Hls.Events.ERROR, (e, data) => {
        if (data.fatal) showToast('Stream unavailable or geo-blocked');
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = streamUrl;
      video.play().catch(()=>{});
    } else {
      section.querySelector('div:last-child').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:0.85rem;">HLS not supported in this browser</div>';
    }
  }

  function closeChannelPlayer() {
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    const el = document.getElementById('channel-player-section');
    if (el) el.remove();
    document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
  }

  function filterChannels(q) {
    q = q.toLowerCase().trim();
    document.querySelectorAll('.channel-card').forEach(c => {
      const name = c.querySelector('.channel-name')?.textContent.toLowerCase() || '';
      c.style.display = (!q || name.includes(q)) ? '' : 'none';
    });
    // Hide section titles if all cards in that section are hidden
    document.querySelectorAll('.channels-section-title').forEach(title => {
      const grid = title.nextElementSibling;
      if (!grid) return;
      const visible = [...grid.querySelectorAll('.channel-card')].some(c => c.style.display !== 'none');
      title.style.display = visible ? '' : 'none';
    });
  }

  async function showChannels(btn) {
    channelsView = true;
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    closePlayer();
    document.getElementById('search-input').value = '';
    document.getElementById('channel-search-bar').style.display = 'block';
    document.getElementById('channel-search-input').value = '';
    if (channelsLoaded) return;
    document.getElementById('matches-container').innerHTML = `<div class="skel-grid"><div class="skel"></div><div class="skel"></div><div class="skel"></div><div class="skel"></div><div class="skel"></div><div class="skel"></div></div>`;
    try {
      const [chRes, stRes] = await Promise.all([
        fetch('https://iptv-org.github.io/api/channels.json'),
        fetch('https://iptv-org.github.io/api/streams.json')
      ]);
      const allChannels = await chRes.json();
      const allStreams = await stRes.json();

      // Build stream lookup by channel id
      const streamMap = {};
      allStreams.forEach(s => {
        if (s.channel && s.url && !streamMap[s.channel]) {
          streamMap[s.channel] = s.url;
        }
      });

      // Only show channels that have a stream and are not NSFW
      const channels = allChannels.filter(ch => streamMap[ch.id] && !ch.is_nsfw && !ch.closed);

      // Group by country
      const groups = {};
      channels.forEach(ch => {
        const code = (ch.country || 'other').toLowerCase();
        if (!groups[code]) groups[code] = [];
        groups[code].push(ch);
      });

      const priority = ['gb','us'];
      const sorted = [...priority.filter(c=>groups[c]), ...Object.keys(groups).filter(c=>!priority.includes(c)).sort()];

      const container = document.createElement('div');
      sorted.forEach(code => {
        const chs = groups[code];
        const countryName = COUNTRY_NAMES[code] || code.toUpperCase();
        const title = document.createElement('div');
        title.className = 'channels-section-title';
        title.textContent = countryName;
        container.appendChild(title);
        const grid = document.createElement('div');
        grid.className = 'channels-grid';
        chs.forEach(ch => {
          const card = document.createElement('div');
          card.className = 'channel-card';
          const logo = ch.logo ? `<img class="channel-logo" src="${ch.logo}" alt="" onerror="this.style.display='none'">` : `<div style="font-size:1.5rem">📺</div>`;
          card.innerHTML = `${logo}<div class="channel-name">${ch.name||'Channel'}</div>`;
          card.addEventListener('click', () => playChannel(streamMap[ch.id], ch.name, card));
          grid.appendChild(card);
        });
        container.appendChild(grid);
      });

      document.getElementById('matches-container').innerHTML = '';
      document.getElementById('matches-container').appendChild(container);
      channelsLoaded = true;
    } catch(e) {
      document.getElementById('matches-container').innerHTML = `<div class="empty">Could not load channels.</div>`;
    }
  }

  async function checkUrlMatch() {
    const params = new URLSearchParams(window.location.search);
    const matchId = params.get('match');
    if (!matchId) return;
    try {
      const res = await fetch(W + '/api/matches/all');
      const matches = await res.json();
      const match = matches.find(m => m.id === matchId);
      if (match) openMatch(match);
    } catch(e) {}
  }

  // Multistream
  let multistreams = []; // [{match, embedUrl}]

  async function addToMultistream(match, btn) {
    if (multistreams.length >= 4) { showToast('Maximum 4 streams at once'); return; }
    if (multistreams.find(m => m.match.id === match.id)) { showToast('Already in multistream'); return; }

    btn.classList.add('added');
    btn.textContent = '⊞ Added';

    // Fetch first available stream
    const sources = match.sources || [];
    let embedUrl = null;
    for (const s of sources) {
      try {
        const data = await fetch(`${W}/api/stream/${s.source}/${s.id}`).then(r => r.json());
        const arr = Array.isArray(data) ? data : [];
        if (arr.length) {
          embedUrl = `https://embedsports.top/embed/${s.source}/${s.id}/${arr[0].streamNo || 1}`;
          break;
        }
      } catch(e) {}
    }

    if (!embedUrl) { showToast('No stream available'); btn.classList.remove('added'); btn.textContent = '⊞'; return; }

    multistreams.push({ match, embedUrl });
    renderMultistream();
    document.getElementById('multistream-section').classList.add('visible');
    document.getElementById('multistream-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
    showToast(`Added to multistream (${multistreams.length}/4)`);
  }

  function renderMultistream() {
    const grid = document.getElementById('multistream-grid');
    grid.className = `multistream-grid count-${multistreams.length}`;
    grid.innerHTML = '';
    multistreams.forEach((item, i) => {
      const cell = document.createElement('div');
      cell.className = 'multistream-cell';
      cell.innerHTML = `
        <iframe src="${item.embedUrl}" allow="autoplay; fullscreen; encrypted-media" scrolling="no"></iframe>
        <div class="multistream-cell-label">${item.match.title}</div>
        <button class="multistream-cell-remove" onclick="removeFromMultistream(${i})">✕</button>
      `;
      grid.appendChild(cell);
    });
  }

  function removeFromMultistream(index) {
    const removed = multistreams[index];
    multistreams.splice(index, 1);
    // Reset the card button
    document.querySelectorAll('.card-multi.added').forEach(btn => {
      if (btn.closest('.match-card')?.querySelector('.card-title')?.textContent === removed.match.title) {
        btn.classList.remove('added');
        btn.textContent = '⊞';
      }
    });
    if (!multistreams.length) {
      document.getElementById('multistream-section').classList.remove('visible');
    } else {
      renderMultistream();
    }
  }

  function clearMultistream() {
    multistreams = [];
    document.querySelectorAll('.card-multi.added').forEach(btn => { btn.classList.remove('added'); btn.textContent = '⊞'; });
    document.getElementById('multistream-section').classList.remove('visible');
  }

  function toggleMultiFullscreen() {
    const el = document.getElementById('multistream-section');
    if (!document.fullscreenElement) {
      el.requestFullscreen().catch(() => showToast('Fullscreen not supported'));
    } else {
      document.exitFullscreen();
    }
  }

  loadSports();
  loadMatches();
  checkUrlMatch();

  setInterval(async () => {
    try { document.getElementById('live-count').textContent = (await fetch(W+'/api/matches/live').then(r=>r.json())).length; } catch(e) {}
  }, 60000);
</script>
